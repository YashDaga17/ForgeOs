# ==============================================================================
# ForgeOS CI Pipeline
# Runs type checks, dependency checks, and dry compiles on push and pull request.
# ==============================================================================

name: CI Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Build & Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Type Checking
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build

  backend:
    name: Backend Validation & Imports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify Imports Dry-Run
        run: |
          cd backend
          python -c "import app.pipeline.orchestrator; import app.pipeline.decision_engine; import app.services.patch_manager; import app.services.rollback_manager; import app.services.artifact_manager; print('Backend Imports OK!')"
